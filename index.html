<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurveCrash AI — Play vs Bot</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0/dist/tf.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; height:100vh; }
#app { display:flex; height:100vh; }
#sidebar { width:280px; background:#12121e; border-right:2px solid #1a1a2e; padding:16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
#sidebar h1 { font-size:18px; color:#0ff; margin:0; }
#sidebar h1 span { color:#888; font-size:12px; font-weight:normal; }
.btn { padding:10px 16px; border:none; border-radius:6px; font-weight:bold; font-size:14px; cursor:pointer; transition:all .15s; }
.btn:hover { filter:brightness(1.2); }
.btn-start { background:#0066aa; color:#fff; font-size:16px; }
.btn-start.running { background:#aa2222; }
.info-box { background:#1a1a2e; border-radius:6px; padding:10px; font-size:12px; line-height:1.6; font-family:monospace; }
.info-box .label { color:#888; }
.info-box .val { color:#0f0; }
.info-box .val-warn { color:#f80; }
.info-box .val-bad { color:#f44; }
#game-wrap { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
canvas#game { background:#0d0d18; border:2px solid #1a1a2e; border-radius:4px; image-rendering:pixelated; }
#overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
#overlay h2 { font-size:28px; color:#0ff; text-shadow:0 0 20px #0ff8; margin-bottom:8px; }
#overlay p { font-size:16px; color:#aaa; }
#status-bar { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); font-size:13px; color:#888; background:#12121ecc; padding:4px 12px; border-radius:4px; }
#controls-hint { font-size:11px; color:#666; text-align:center; line-height:1.5; }
.speed-sel { display:flex; gap:4px; }
.speed-sel button { flex:1; padding:4px; font-size:11px; background:#1a1a2e; color:#888; border:1px solid #333; border-radius:3px; cursor:pointer; }
.speed-sel button.active { background:#0066aa; color:#fff; border-color:#08f; }
#ai-viz-wrap { text-align:center; }
#ai-viz-wrap canvas { border:1px solid #333; image-rendering:pixelated; }
#ai-viz-label { font-size:10px; color:#555; margin-top:2px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>CurveCrash AI <span>v8 IMPALA</span></h1>
    <div class="info-box" id="model-info">
      <span class="label">Model:</span> <span class="val-warn">loading v8 weights...</span>
    </div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">AI Model</div>
      <select id="model-sel" style="width:100%;padding:4px;background:#1a1a2e;color:#0f0;border:1px solid #333;border-radius:3px;font-size:12px;font-family:monospace">
        <option value="curvecrash_v8_weights.json" selected>v8 IMPALA 7ch (best)</option>
        <option value="models/v11.json">v11 IMPALA 9ch + scalars</option>
        <option value="models/v9.json">v9 IMPALA 7ch</option>
        <option value="models/v9_1.json">v9.1 IMPALA 7ch</option>
        <option value="models/exp_voronoi_7ch.json">exp NatureCNN+Voronoi 7ch</option>
        <option value="">custom file...</option>
      </select>
    </div>
    <button class="btn btn-start" id="btn-start">START GAME</button>
    <div class="info-box" id="score-info">
      <div><span class="label">Human:</span> <span class="val" id="s-human">0</span></div>
      <div><span class="label">AI:</span> <span class="val" id="s-ai">0</span></div>
      <div><span class="label">Draws:</span> <span class="val" id="s-draw">0</span></div>
      <div><span class="label">Round:</span> <span class="val" id="s-round">0</span></div>
    </div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">Game Speed</div>
      <div class="speed-sel" id="speed-sel">
        <button data-speed="0.5">0.5x</button>
        <button data-speed="1" class="active">1x</button>
        <button data-speed="2">2x</button>
        <button data-speed="3">3x</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">Players</div>
      <div class="speed-sel" id="player-sel">
        <button data-p="2" class="active">1v1</button>
        <button data-p="3">3</button>
        <button data-p="4">4</button>
        <button data-p="6">6</button>
      </div>
    </div>
    <div class="info-box" id="perf-info">
      <span class="label">Infer:</span> <span class="val">—</span>
    </div>
    <div id="ai-viz-wrap">
      <canvas id="ai-viz" width="128" height="128" style="width:128px;height:128px;"></canvas>
      <div id="ai-viz-label">AI trail view (world-frame)</div>
    </div>
    <div id="controls-hint">
      <b>Controls:</b> Arrow Left/Right to steer<br>
      Space or Enter to start round<br>
      Human = <span style="color:#4f4">green</span>, AI = <span style="color:#f44">red</span>
    </div>
  </div>
  <div id="game-wrap">
    <canvas id="game" width="512" height="512"></canvas>
    <div id="overlay">
      <h2>CurveCrash AI</h2>
      <p>Press START or Space to play</p>
    </div>
    <div id="status-bar"></div>
  </div>
</div>

<script>
'use strict';

// ======================== PHYSICS (512x512 sim grid, matching curvecrash_env_ffa.py GS++ mode) ========================
const A = 512;                              // ARENA_SIM
const FPS = 60;
const DT = 1.0 / FPS;
// GS++ ratios from replay data (raw / 922 field width)
const SPEED_RATIO = 180.0 / 922;            // ≈ 0.1952
const TR_RATIO = 38.5 / 922;               // ≈ 0.04175
const TW_RATIO = 6.3 / 922;                // ≈ 0.006832
const GL_RATIO = 22.4 / 922;               // ≈ 0.02429
// Sim-resolution values
const SPEED_PS = SPEED_RATIO * A;           // ~100 px/s
const TURN_RADIUS = TR_RATIO * A;           // ~21.4 px
const TURN_RATE_PS = SPEED_PS / TURN_RADIUS;// ~4.68 rad/s
const TRAIL_W = TW_RATIO * A;              // ~3.5 px
const TRAIL_HW = Math.max(1, Math.round(TRAIL_W / 2)); // 2
const HEAD_R = Math.max(1, Math.round(TRAIL_W / 2));    // 2
const GAP_LEN = GL_RATIO * A;              // ~12.4 px
const GAP_INT_MIN = 1.1, GAP_INT_MAX = 2.0;// seconds between gaps
const WM = TRAIL_W / 2 + 1;                // ~2.75 wall collision margin
const ARENA_H = 424;                       // GS++ rectangular playable height
const OFF_Y = 44;                          // (512-424)/2 vertical offset
const MAX_STEPS = 10800;                   // 3600 agent steps * FRAME_SKIP=3 = 180s
const SKIP_FRAMES = Math.max(8, Math.floor(TRAIL_W * 3)); // ~10 self-collision grace
const CR = Math.max(1, Math.floor(TRAIL_W / 2) - 1);      // 1 collision check radius
// Observation
const OBS = 128;
const DS = A / OBS;                         // 4
// Powerups
const PUP_RADIUS = 16;                     // sim px
const PUP_PICKUP_R = PUP_RADIUS + TRAIL_W / 2; // ~17.75
const PUP_SPAWN_INT = 76;
const PUP_FIRST_SPAWN = Math.round(3.5 * FPS);
const PUP_SPEED_MULT = 2.0;
const PUP_SPEED_DUR = 4 * FPS;             // 240 frames

// Precomputed wall mask at obs resolution (128x128)
const WALL_MASK = new Float32Array(OBS * OBS);
{
  const top_ds = Math.floor(OFF_Y / DS);        // 11
  const bot_ds = Math.min(OBS, Math.floor((OFF_Y + ARENA_H + DS - 1) / DS)); // 117
  for (let r = 0; r < top_ds; r++) for (let c = 0; c < OBS; c++) WALL_MASK[r*OBS+c] = 1;
  for (let r = bot_ds; r < OBS; r++) for (let c = 0; c < OBS; c++) WALL_MASK[r*OBS+c] = 1;
  if (top_ds >= 0 && top_ds < OBS) for (let c = 0; c < OBS; c++) WALL_MASK[top_ds*OBS+c] = 1;
  if (bot_ds > 0 && bot_ds <= OBS) for (let c = 0; c < OBS; c++) WALL_MASK[(bot_ds-1)*OBS+c] = 1;
  for (let r = top_ds; r < bot_ds; r++) { WALL_MASK[r*OBS] = 1; WALL_MASK[r*OBS+OBS-1] = 1; }
}

// ======================== GAME STATE ========================
const G = {
  running: false, players: [], step: 0, maxPlayers: 2, gameSpeed: 1,
  scores: { human: 0, ai: 0, draw: 0, round: 0 },
  model: null, inferMs: 0, inferAvg: 0,
  trailOwner: new Int16Array(A*A),
  trailFrame: new Int32Array(A*A),
  powerups: [], pupIdCounter: 0, pupSpawnTimer: 0,
};

// Pre-allocated buffers to avoid per-frame GC pressure
const _rotMap = new Int32Array(OBS*OBS);
const _rotBufs = Array.from({length:8}, () => new Float32Array(OBS*OBS));
let _rotBufIdx = 0;
const _selfDs = new Float32Array(OBS*OBS);
const _enemyDs = new Float32Array(OBS*OBS);
const _spdCh = new Float32Array(OBS*OBS);
const _ersCh = new Float32Array(OBS*OBS);
const _blocked = new Uint8Array(OBS*OBS);
const _territory = new Uint8Array(OBS*OBS);
const _obsNhwc = new Float32Array(OBS*OBS*9); // max 9ch for v11
const _vorBuf = new Float32Array(OBS*OBS);

// ======================== CANVAS ========================
const gc = document.getElementById('game');
const ctx = gc.getContext('2d');
const vizC = document.getElementById('ai-viz');
const vizCtx = vizC.getContext('2d');
const overlay = document.getElementById('overlay');
const statusBar = document.getElementById('status-bar');
// Offscreen canvas for sim→display scaling
const offC = document.createElement('canvas'); offC.width = A; offC.height = A;
const offCtx = offC.getContext('2d');

// ======================== INPUT ========================
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; if ((e.code === 'Space' || e.code === 'Enter') && !G.running) startRound(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ======================== UI WIRING ========================
document.getElementById('model-sel').onchange = async e => {
  const val = e.target.value;
  if (val === '') { loadWeights(); return; }
  await loadModelFromURL(val);
};
document.getElementById('btn-start').onclick = () => { if (!G.running) { clearTimeout(G._restartTimer); startRound(); } else endRound('abort'); };
document.getElementById('speed-sel').onclick = e => { if (!e.target.dataset.speed) return; G.gameSpeed = parseFloat(e.target.dataset.speed); document.querySelectorAll('#speed-sel button').forEach(b => b.classList.toggle('active', b === e.target)); };
document.getElementById('player-sel').onclick = e => { if (!e.target.dataset.p) return; G.maxPlayers = parseInt(e.target.dataset.p); document.querySelectorAll('#player-sel button').forEach(b => b.classList.toggle('active', b === e.target)); };

// ======================== WEIGHT LOADING ========================
function applyModel(json) {
  // Dispose old model tensors
  if (G.model) {
    // TF.js tensors in model need explicit disposal
    const dispose = t => { if (t && t.dispose) t.dispose(); };
    if (G.model.stages) G.model.stages.forEach(s => Object.values(s).forEach(dispose));
    if (G.model.conv) G.model.conv.forEach(c => { dispose(c.w); dispose(c.b); });
    if (G.model.cbam) Object.values(G.model.cbam).forEach(dispose);
    if (G.model.sa) Object.values(G.model.sa).forEach(v => dispose(v));
    dispose(G.model.fc?.w); dispose(G.model.fc?.b);
    if (G.model.gru) Object.values(G.model.gru).forEach(g => Object.values(g).forEach(dispose));
    dispose(G.model.actor?.w); dispose(G.model.actor?.b);
  }
  // Dispose all player GRU states
  for (const p of G.players) if (p.gruTensor) { p.gruTensor.dispose(); p.gruTensor = null; }
  G.model = buildTFModel(json);
  const info = document.getElementById('model-info');
  info.innerHTML = `<span class="label">Model:</span> <span class="val">${G.model.arch} ${G.model.nCh}ch</span>`;
}

async function loadModelFromURL(url) {
  const info = document.getElementById('model-info');
  info.innerHTML = '<span class="label">Loading...</span>';
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    applyModel(json);
    overlay.querySelector('p').textContent = 'Press START or Space to play!';
  } catch(err) { info.innerHTML = `<span class="val-bad">Error: ${err.message}</span>`; }
}

function loadWeights() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const json = JSON.parse(await file.text());
      applyModel(json);
      overlay.querySelector('p').textContent = 'Press START or Space to play!';
    } catch(err) { document.getElementById('model-info').innerHTML = `<span class="val-bad">Error: ${err.message}</span>`; }
  };
  input.click();
}

// ======================== BASE64 WEIGHT DECODING ========================
function b64toF32(b64str, shape) {
  const bin = atob(b64str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const floats = new Float32Array(bytes.buffer);
  if (shape.length === 1) return tf.tensor1d(floats);
  if (shape.length === 2) return tf.tensor2d(floats, shape);
  if (shape.length === 4) return tf.tensor4d(floats, shape);
  return tf.tensor(floats, shape);
}
function decW(layer, key) {
  if (typeof layer[key] === 'string' && layer[key + '_shape']) return b64toF32(layer[key], layer[key + '_shape']);
  if (layer[key + '_shape']) return tf.tensor(layer[key], layer[key + '_shape']);
  if (Array.isArray(layer[key])) {
    const a = layer[key];
    if (a.length > 0 && Array.isArray(a[0])) {
      if (Array.isArray(a[0][0])) { if (Array.isArray(a[0][0][0])) return tf.tensor4d(a); return tf.tensor3d(a); }
      return tf.tensor2d(a);
    }
    return tf.tensor1d(a);
  }
  return null;
}
function decGRUGate(g) {
  return {
    Wi: typeof g.kernel_input === 'string' ? b64toF32(g.kernel_input, g.kernel_input_shape) : tf.tensor2d(g.kernel_input),
    Wh: typeof g.kernel_hidden === 'string' ? b64toF32(g.kernel_hidden, g.kernel_hidden_shape) : tf.tensor2d(g.kernel_hidden),
    bi: typeof g.bias_input === 'string' ? b64toF32(g.bias_input, g.bias_input_shape) : tf.tensor1d(g.bias_input),
    bh: typeof g.bias_hidden === 'string' ? b64toF32(g.bias_hidden, g.bias_hidden_shape) : tf.tensor1d(g.bias_hidden),
  };
}

// ======================== TF.JS MODEL ========================
function buildTFModel(json) {
  const m = { arch: json.arch || 'naturecnn', nCh: json.n_input_channels || 6 };
  const layers = json.layers; let idx = 0;
  if (m.arch === 'impala') {
    const ns = json.impala_channels ? json.impala_channels.length : 3;
    m.stages = [];
    for (let i = 0; i < ns; i++) { const l = layers[idx++];
      m.stages.push({ cW: decW(l,'conv_weight'), cB: decW(l,'conv_bias'), r1c1W: decW(l,'res1_conv1_weight'), r1c1B: decW(l,'res1_conv1_bias'), r1c2W: decW(l,'res1_conv2_weight'), r1c2B: decW(l,'res1_conv2_bias'), r2c1W: decW(l,'res2_conv1_weight'), r2c1B: decW(l,'res2_conv1_bias'), r2c2W: decW(l,'res2_conv2_weight'), r2c2B: decW(l,'res2_conv2_bias') });
    }
  } else {
    m.conv = [];
    for (let i = 0; i < 3; i++) { const l = layers[idx++]; m.conv.push({ w: decW(l,'weight'), b: decW(l,'bias'), s: l.stride }); }
  }
  m.hasCBAM = json.has_cbam;
  if (m.hasCBAM) { const l = layers[idx++]; m.cbam = { f0: decW(l,'channel_fc0_weight'), f2: decW(l,'channel_fc2_weight'), sp: decW(l,'spatial_conv_weight') }; }
  m.hasSA = json.has_spatial_attn;
  if (m.hasSA) { const l = layers[idx++]; m.sa = { qkv: decW(l,'qkv_weight'), pW: decW(l,'proj_weight'), pB: decW(l,'proj_bias'), nh: l.num_heads, d: l.dim }; }
  const fcL = layers[idx++]; m.fc = { w: decW(fcL,'weight'), b: decW(fcL,'bias') };
  // Scalar FC branch (v10/v11)
  m.hasScalar = (json.n_scalar_inputs || 0) > 0;
  if (m.hasScalar) {
    const sl = layers[idx++];
    m.scalarFc = { w0: decW(sl,'w0'), b0: decW(sl,'b0'), w1: decW(sl,'w1'), b1: decW(sl,'b1') };
  }
  m.hasGRU = json.gru_hidden > 0;
  if (m.hasGRU) { const gl = layers[idx++]; m.gruH = gl.units; m.gru = {}; for (const g of ['reset','update','new']) m.gru[g] = decGRUGate(gl.gates[g]); }
  const aL = layers[idx++]; m.actor = { w: decW(aL,'weight'), b: decW(aL,'bias') };
  return m;
}

function aiInfer(obsNhwc, player, scalars) {
  if (!G.model) return 1;
  const t0 = performance.now(); const m = G.model; let newGru = null;
  const act = tf.tidy(() => {
    // Slice buffer to actual channel count (buffer is pre-allocated for max 9ch)
    const obsSlice = obsNhwc.length === OBS*OBS*m.nCh ? obsNhwc : obsNhwc.subarray(0, OBS*OBS*m.nCh);
    let x = tf.tensor4d(obsSlice, [1, OBS, OBS, m.nCh]);
    if (m.arch === 'impala') {
      for (const s of m.stages) {
        x = tf.conv2d(x, s.cW, 1, 'same').add(s.cB); x = tf.maxPool(x, 3, 2, 'same');
        let r = x; x = tf.relu(x); x = tf.conv2d(x, s.r1c1W, 1, 'same').add(s.r1c1B); x = tf.relu(x); x = tf.conv2d(x, s.r1c2W, 1, 'same').add(s.r1c2B); x = x.add(r);
        r = x; x = tf.relu(x); x = tf.conv2d(x, s.r2c1W, 1, 'same').add(s.r2c1B); x = tf.relu(x); x = tf.conv2d(x, s.r2c2W, 1, 'same').add(s.r2c2B); x = x.add(r);
      }
      x = tf.relu(x);
    } else { for (const c of m.conv) x = tf.relu(tf.conv2d(x, c.w, c.s, 'valid').add(c.b)); }
    if (m.hasCBAM) {
      const af = x.mean([1,2],true).reshape([1,-1]), mf = x.max([1,2],true).reshape([1,-1]);
      x = x.mul(tf.sigmoid(tf.relu(tf.matMul(af,m.cbam.f0)).matMul(m.cbam.f2).add(tf.relu(tf.matMul(mf,m.cbam.f0)).matMul(m.cbam.f2))).reshape([1,1,1,-1]));
      x = x.mul(tf.sigmoid(tf.conv2d(tf.concat([x.mean(3,true),x.max(3,true)],3),m.cbam.sp,1,'same')));
    }
    if (m.hasSA) {
      const sa=m.sa, [B,H,W,C]=x.shape, nt=H*W, hd=sa.d/sa.nh, sc=1/Math.sqrt(hd);
      const tok=x.reshape([1,nt,C]), qkv=tf.matMul(tok,sa.qkv).reshape([1,nt,3,sa.nh,hd]).transpose([2,0,3,1,4]);
      const q=qkv.gather(0).reshape([1,sa.nh,nt,hd]), k=qkv.gather(1).reshape([1,sa.nh,nt,hd]), v=qkv.gather(2).reshape([1,sa.nh,nt,hd]);
      x = tok.add(tf.matMul(tf.matMul(tf.softmax(tf.matMul(q,k.transpose([0,1,3,2])).mul(sc),-1),v).transpose([0,2,1,3]).reshape([1,nt,C]),sa.pW).add(sa.pB)).reshape([1,H,W,C]);
    }
    x = tf.relu(tf.matMul(x.reshape([1,-1]),m.fc.w).add(m.fc.b));
    // Scalar branch: FC(13→64→64) concatenated with CNN features before GRU
    if (m.hasScalar && scalars) {
      const st = tf.tensor2d(scalars, [1, scalars.length]);
      const sf = tf.relu(tf.matMul(tf.relu(tf.matMul(st, m.scalarFc.w0).add(m.scalarFc.b0)), m.scalarFc.w1).add(m.scalarFc.b1));
      x = tf.concat([x, sf], 1); // [1, 256+64=320]
    }
    if (m.hasGRU) {
      const h = player.gruTensor || tf.zeros([1,m.gruH]);
      const rg=m.gru.reset, zg=m.gru.update, ng=m.gru.new;
      const r=tf.sigmoid(tf.matMul(x,rg.Wi).add(rg.bi).add(tf.matMul(h,rg.Wh).add(rg.bh)));
      const z=tf.sigmoid(tf.matMul(x,zg.Wi).add(zg.bi).add(tf.matMul(h,zg.Wh).add(zg.bh)));
      const n=tf.tanh(tf.matMul(x,ng.Wi).add(ng.bi).add(r.mul(tf.matMul(h,ng.Wh).add(ng.bh))));
      const hNew=tf.sub(tf.scalar(1),z).mul(n).add(z.mul(h));
      newGru = tf.keep(hNew); x = hNew;
    }
    const l = tf.matMul(x,m.actor.w).add(m.actor.b).dataSync();
    return l[0]>=l[1]&&l[0]>=l[2] ? 0 : l[2]>=l[1] ? 2 : 1;
  });
  if (newGru) { if (player.gruTensor) player.gruTensor.dispose(); player.gruTensor = newGru; }
  const ms = performance.now() - t0;
  G.inferMs = ms; G.inferAvg = G.inferAvg > 0 ? G.inferAvg * 0.9 + ms * 0.1 : ms;
  return act;
}

// ======================== OBSERVATION (matches env exactly) ========================
function buildRotMap(hx, hy, hdg) {
  const N=OBS, half=N/2, cos=Math.cos(hdg), sin=Math.sin(hdg);
  for (let r=0; r<N; r++) { const dy=r-half+.5;
    for (let c=0; c<N; c++) { const dx=c-half+.5;
      const sc=(hx+cos*dx-sin*dy+.5)|0, sr=(hy+sin*dx+cos*dy+.5)|0;
      _rotMap[r*N+c] = (sc>=0&&sc<N&&sr>=0&&sr<N) ? sr*N+sc : -1;
    }
  }
  return _rotMap;
}
function rotChMap(ch, map, fill) {
  const out = _rotBufs[_rotBufIdx++ & 7]; // cycle through 8 pre-allocated buffers
  for (let i=0; i<OBS*OBS; i++) { const j=map[i]; out[i]=j>=0?ch[j]:fill; }
  return out;
}

function buildObs(pid) {
  // Step 1: bool masks at 512x512 from trailOwner
  const AA = A*A, N = OBS, NN = N*N;
  _rotBufIdx = 0; // reset rotation buffer pool
  _selfDs.fill(0); _enemyDs.fill(0);
  const selfDs = _selfDs, enemyDs = _enemyDs;

  // Step 2: downsample 512→128 with .any() over 4x4 blocks
  for (let or = 0; or < N; or++) {
    for (let oc = 0; oc < N; oc++) {
      let hasSelf = false, hasEnemy = false;
      const baseR = or * DS, baseC = oc * DS;
      for (let dy = 0; dy < DS && !(hasSelf && hasEnemy); dy++) {
        const row = baseR + dy;
        for (let dx = 0; dx < DS; dx++) {
          const v = G.trailOwner[row * A + baseC + dx];
          if (v === pid) hasSelf = true;
          else if (v > 0) hasEnemy = true;
        }
      }
      if (hasSelf) selfDs[or*N+oc] = 1;
      if (hasEnemy) enemyDs[or*N+oc] = 1;
    }
  }

  // Save raw trail-only copies for Voronoi (before walls/arrows are merged)
  const selfTrailOnly = new Float32Array(selfDs);
  const enemyTrailOnly = new Float32Array(enemyDs);

  // Step 3: add wall mask
  for (let i = 0; i < NN; i++) if (WALL_MASK[i]) selfDs[i] = 1;

  // Step 4: direction arrows (5px at obs res)
  const me = G.players.find(p => p.id === pid);
  if (!me) return null;
  for (const p of G.players) {
    if (!p.alive) continue;
    const ch = (p.id === pid) ? selfDs : enemyDs;
    const px = p.x / DS, py = p.y / DS;
    const cos_a = Math.cos(p.angle), sin_a = Math.sin(p.angle);
    for (let t = 0; t < 5; t++) {
      const ax = Math.round(px + cos_a * t), ay = Math.round(py + sin_a * t);
      if (ax >= 0 && ax < N && ay >= 0 && ay < N) ch[ay*N+ax] = 1;
    }
  }

  // Step 5: powerup grids at obs res
  _spdCh.fill(0); _ersCh.fill(0);
  const spdCh = _spdCh, ersCh = _ersCh;
  const pupRds = Math.max(1, Math.round(PUP_RADIUS / DS)); // 4
  for (const pup of G.powerups) {
    const px = Math.round(pup.x / DS), py = Math.round(pup.y / DS);
    const ch = pup.type === 'speed' ? spdCh : ersCh;
    for (let dy = -pupRds; dy <= pupRds; dy++) for (let dx = -pupRds; dx <= pupRds; dx++) {
      if (dx*dx+dy*dy <= pupRds*pupRds) { const cx=px+dx, cy=py+dy; if(cx>=0&&cx<N&&cy>=0&&cy<N) ch[cy*N+cx]=1; }
    }
  }

  // Step 6: ego-centric rotation (shared map for all channels)
  const hx = me.x / DS, hy = me.y / DS, hdg = me.angle;
  const rmap = buildRotMap(hx, hy, hdg);
  const rS = rotChMap(selfDs, rmap, 1), rE = rotChMap(enemyDs, rmap, 0);
  const rSpd = rotChMap(spdCh, rmap, 0), rErs = rotChMap(ersCh, rmap, 0);

  // Step 7: previous frame channels (world-frame, rotated with current heading)
  let rPS, rPE;
  if (me.prevSelf) { rPS = rotChMap(me.prevSelf, rmap, 1); rPE = rotChMap(me.prevEnemy, rmap, 0); }
  else { const z = new Float32Array(NN); rPS = rotChMap(z, rmap, 1); rPE = rotChMap(z, rmap, 0); }

  // Voronoi
  const nCh = G.model ? G.model.nCh : 7;
  let rV = null;
  if (nCh >= 7) {
    // BFS at obs resolution
    _blocked.fill(0); _territory.fill(0);
    const blocked = _blocked, territory = _territory;
    // Use raw trail-only grids (no walls/arrows) to match env's trail_owner > 0
    for (let i = 0; i < NN; i++) if (selfTrailOnly[i] > .5 || enemyTrailOnly[i] > .5) blocked[i] = 1;
    const ehx = Math.round(hx), ehy = Math.round(hy), ei = ehy*N+ehx;
    let egoQ = [], enemyQ = [];
    if (ei >= 0 && ei < NN && !blocked[ei]) { territory[ei] = 1; blocked[ei] = 1; egoQ.push(ei); }
    for (const p of G.players) {
      if (!p.alive || p.id === pid) continue;
      const ex = Math.round(p.x/DS), ey = Math.round(p.y/DS), idx = ey*N+ex;
      if (idx >= 0 && idx < NN && !blocked[idx]) { territory[idx] = 2; blocked[idx] = 1; enemyQ.push(idx); }
    }
    while (egoQ.length || enemyQ.length) {
      let nE = [];
      for (const i of egoQ) { const c=i%N, r=(i-c)/N;
        if(c>0&&!blocked[i-1]){blocked[i-1]=1;territory[i-1]=1;nE.push(i-1);}
        if(c<N-1&&!blocked[i+1]){blocked[i+1]=1;territory[i+1]=1;nE.push(i+1);}
        if(r>0&&!blocked[i-N]){blocked[i-N]=1;territory[i-N]=1;nE.push(i-N);}
        if(r<N-1&&!blocked[i+N]){blocked[i+N]=1;territory[i+N]=1;nE.push(i+N);}
      }
      let nX = [];
      for (const i of enemyQ) { const c=i%N, r=(i-c)/N;
        if(c>0&&!blocked[i-1]){blocked[i-1]=1;territory[i-1]=2;nX.push(i-1);}
        if(c<N-1&&!blocked[i+1]){blocked[i+1]=1;territory[i+1]=2;nX.push(i+1);}
        if(r>0&&!blocked[i-N]){blocked[i-N]=1;territory[i-N]=2;nX.push(i-N);}
        if(r<N-1&&!blocked[i+N]){blocked[i+N]=1;territory[i+N]=2;nX.push(i+N);}
      }
      egoQ = nE; enemyQ = nX;
    }
    _vorBuf.fill(0); const vor = _vorBuf;
    for (let i = 0; i < NN; i++) if (territory[i] === 1) vor[i] = 1;
    rV = rotChMap(vor, rmap, 0);
  }

  // Step 8: stack NHWC
  const obs = _obsNhwc;
  for (let i = 0; i < NN; i++) {
    obs[i*nCh] = rS[i]; obs[i*nCh+1] = rE[i]; obs[i*nCh+2] = rPS[i]; obs[i*nCh+3] = rPE[i];
    obs[i*nCh+4] = rSpd[i]; obs[i*nCh+5] = rErs[i];
    if (nCh >= 7) obs[i*nCh+6] = rV[i];
    // v11: minimap = non-rotated world-frame self/enemy (channels 7-8)
    if (nCh >= 9) { obs[i*nCh+7] = selfDs[i]; obs[i*nCh+8] = enemyDs[i]; }
  }

  // Scalar obs (13 values) for models that use scalar branch
  let scalars = null;
  if (G.model && G.model.hasScalar) {
    scalars = new Float32Array(13);
    // 8 ray distances (ego-relative, 45° apart)
    const maxDist = 256.0, stepSz = 2.0, nSteps = Math.floor(maxDist/stepSz);
    for (let ri = 0; ri < 8; ri++) {
      const rayA = me.angle + ri * Math.PI * 2 / 8;
      const rdx = Math.cos(rayA) * stepSz, rdy = Math.sin(rayA) * stepSz;
      let rx = me.x, ry = me.y;
      scalars[ri] = 1.0; // default: max distance
      for (let s = 1; s <= nSteps; s++) {
        rx += rdx; ry += rdy;
        const ix = Math.round(rx), iy = Math.round(ry);
        if (ix < 0 || ix >= A || iy < OFF_Y || iy >= OFF_Y + ARENA_H) { scalars[ri] = s*stepSz/maxDist; break; }
        if (ix >= 0 && ix < A && iy >= 0 && iy < A) {
          const owner = G.trailOwner[iy*A+ix];
          if (owner > 0) {
            if (owner === pid && G.trailFrame[iy*A+ix] < G.step - SKIP_FRAMES) { scalars[ri] = s*stepSz/maxDist; break; }
            else if (owner !== pid) { scalars[ri] = s*stepSz/maxDist; break; }
          }
        }
      }
    }
    scalars[8] = me.speedBoosts.length > 0 ? 1.0 : 0.0; // speed boost active
    scalars[9] = me.nextGapAt > 0 ? Math.min(1.0, me.gapTimer / me.nextGapAt) : 0.0; // gap progress
    let aliveOpp = 0, totalOpp = G.players.length - 1;
    for (const p of G.players) if (p.id !== pid && p.alive) aliveOpp++;
    scalars[10] = totalOpp > 0 ? aliveOpp / totalOpp : 0.0; // alive fraction
    scalars[11] = 0.0; // territory fraction (would need voronoi area calc, approximate as 0)
    let sMult = 1.0;
    for (const b of me.speedBoosts) sMult *= b.mult;
    scalars[12] = Math.min(1.0, sMult / 4.0); // speed multiplier normalized
  }

  me.prevSelf = selfDs; me.prevEnemy = enemyDs;
  G._vizSelf = selfDs; G._vizEnemy = enemyDs;
  return { obs, scalars };
}

// ======================== TRAIL DRAWING (matches env _draw_trail) ========================
function drawTrail(p) {
  const x = p.x, y = p.y, px = p._prevDrawX, py = p._prevDrawY;
  const dx = x - px, dy = y - py;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const nStamps = Math.max(1, Math.ceil(dist));
  // Perpendicular direction
  let perpX, perpY;
  if (dist > 0.5) { perpX = -dy/dist; perpY = dx/dist; }
  else { perpX = -Math.sin(p.angle); perpY = Math.cos(p.angle); }
  // Stamp perpendicular line at each interpolated point
  for (let s = 0; s <= nStamps; s++) {
    const t = s / nStamps;
    const sx = px + dx*t, sy = py + dy*t;
    for (let i = -TRAIL_HW; i <= TRAIL_HW; i++) {
      const cx = Math.round(sx + perpX*i), cy = Math.round(sy + perpY*i);
      if (cx >= 0 && cx < A && cy >= 0 && cy < A) {
        G.trailOwner[cy*A+cx] = p.id;
        G.trailFrame[cy*A+cx] = G.step;
      }
    }
  }
  // Head circle
  const ix = Math.round(x), iy = Math.round(y);
  for (let dy2 = -HEAD_R; dy2 <= HEAD_R; dy2++) for (let dx2 = -HEAD_R; dx2 <= HEAD_R; dx2++) {
    if (dx2*dx2+dy2*dy2 <= HEAD_R*HEAD_R) {
      const cx = ix+dx2, cy = iy+dy2;
      if (cx >= 0 && cx < A && cy >= 0 && cy < A) { G.trailOwner[cy*A+cx] = p.id; G.trailFrame[cy*A+cx] = G.step; }
    }
  }
  p._prevDrawX = x; p._prevDrawY = y;
}

// ======================== COLLISION (matches env _check_collision) ========================
function checkCollision(x, y, pid) {
  // Wall (GS++ rectangular)
  if (x < WM || x >= A - WM || y < OFF_Y + WM || y >= OFF_Y + ARENA_H - WM) return true;
  // Trail (swept from prev to current is handled by caller)
  const minFrame = G.step - SKIP_FRAMES;
  for (let dy = -CR; dy <= CR; dy++) for (let dx = -CR; dx <= CR; dx++) {
    if (dx*dx+dy*dy > CR*CR) continue;
    const cx = Math.round(x+dx), cy = Math.round(y+dy);
    if (cx < 0 || cx >= A || cy < 0 || cy >= A) return true;
    const owner = G.trailOwner[cy*A+cx];
    if (owner > 0) {
      if (owner === pid && G.trailFrame[cy*A+cx] < minFrame) return true; // old self trail
      if (owner !== pid) return true; // enemy trail
    }
  }
  return false;
}

function sweptCollision(p) {
  const px = p._prevMoveX ?? p.x, py = p._prevMoveY ?? p.y;
  const dx = p.x - px, dy = p.y - py;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const steps = Math.max(1, Math.ceil(dist));
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    if (checkCollision(px + dx*t, py + dy*t, p.id)) return true;
  }
  return false;
}

// ======================== GAME LOGIC ========================
const COLORS = [
  {hex:'#50ff50', rgb:[80,255,80]},   // 0: human green
  {hex:'#ff5050', rgb:[255,80,80]},   // 1: AI red
  {hex:'#50b4ff', rgb:[80,180,255]},  // 2: blue
  {hex:'#ffc832', rgb:[255,200,50]},  // 3: yellow
  {hex:'#c850ff', rgb:[200,80,255]},  // 4: purple
  {hex:'#ff8c32', rgb:[255,140,50]},  // 5: orange
];

function spawnPlayer(id, isHuman) {
  const margin = Math.round(A * 0.15); // ~77 sim px
  const minDist = Math.round(A * 0.08); // ~41 sim px
  let x, y, attempts = 0;
  do {
    x = margin + Math.random() * (A - 2*margin);
    y = OFF_Y + margin + Math.random() * (ARENA_H - 2*margin);
    attempts++;
  } while (attempts < 50 && G.players.some(p => { const d2=(p.x-x)**2+(p.y-y)**2; return d2<minDist*minDist; }));
  return {
    id: id + 1, // 1-indexed like env
    x, y, angle: Math.random() * Math.PI * 2,
    alive: true, isHuman, color: COLORS[id],
    speed: 0, speedBoosts: [],
    spawning: true, stepCount: 0,
    prevSelf: null, prevEnemy: null, gruTensor: null,
    gapTimer: 0, gapRemaining: 0, nextGapAt: GAP_INT_MIN + Math.random()*(GAP_INT_MAX-GAP_INT_MIN),
    drawing: false,
    _prevDrawX: 0, _prevDrawY: 0, _prevMoveX: 0, _prevMoveY: 0, _lastAction: 1,
  };
}

function startRound() {
  for (const p of G.players) if (p.gruTensor) { p.gruTensor.dispose(); }
  G.players = []; G.step = 0;
  G.trailOwner.fill(0);
  G.trailFrame.fill(0);
  G.powerups = []; G.pupIdCounter = 0; G.pupSpawnTimer = PUP_FIRST_SPAWN;
  G.players.push(spawnPlayer(0, true));
  for (let i = 1; i < G.maxPlayers; i++) G.players.push(spawnPlayer(i, false));
  G.running = true; G.scores.round++;
  overlay.style.display = 'none';
  document.getElementById('btn-start').textContent = 'STOP';
  document.getElementById('btn-start').classList.add('running');
  updateScoreUI();
}

function endRound(reason) {
  G.running = false;
  const alive = G.players.filter(p => p.alive);
  let msg = '';
  if (reason === 'abort') msg = 'Round aborted';
  else if (alive.length === 0) { G.scores.draw++; msg = 'Draw!'; }
  else if (alive.length === 1) { if (alive[0].isHuman) { G.scores.human++; msg = 'You win!'; } else { G.scores.ai++; msg = 'AI wins!'; } }
  else if (!G.players[0].alive) { G.scores.ai++; msg = 'AI wins!'; }
  else { G.scores.human++; msg = 'You survived!'; }
  overlay.style.display = '';
  overlay.querySelector('h2').textContent = msg;
  overlay.querySelector('p').textContent = 'Next round in 2s...';
  updateScoreUI();
  if (reason !== 'abort') { clearTimeout(G._restartTimer); G._restartTimer = setTimeout(startRound, 2000); }
  else { document.getElementById('btn-start').textContent = 'START GAME'; document.getElementById('btn-start').classList.remove('running'); overlay.querySelector('p').textContent = 'Press Space to play again'; }
}

function updateScoreUI() {
  document.getElementById('s-human').textContent = G.scores.human;
  document.getElementById('s-ai').textContent = G.scores.ai;
  document.getElementById('s-draw').textContent = G.scores.draw;
  document.getElementById('s-round').textContent = G.scores.round;
}

// ======================== PHYSICS STEP ========================
function physicsStep() {
  for (const p of G.players) {
    if (!p.alive) continue;
    p.stepCount++;

    // AI / Human action
    let action = 1;
    if (p.isHuman) {
      if (keys['ArrowLeft'] || keys['KeyA']) action = 0;
      else if (keys['ArrowRight'] || keys['KeyD']) action = 2;
    } else {
      if (G.model && p.stepCount % 3 === 0) {
        const result = buildObs(p.id);
        if (result) action = aiInfer(result.obs, p, result.scalars);
        p._lastAction = action;
      } else { action = p._lastAction; }
    }

    // Speed boost
    p.speedBoosts = p.speedBoosts.filter(b => b.expire > G.step);
    let speedMult = 1.0;
    for (const b of p.speedBoosts) speedMult *= b.mult;
    const effSpeed = SPEED_PS * speedMult;

    // Steer
    const steer = action - 1; // -1, 0, +1
    if (steer !== 0) {
      const effTR = TURN_RATE_PS * Math.cbrt(speedMult);
      p.angle += steer * effTR * DT;
    }

    // Move
    p._prevMoveX = p.x; p._prevMoveY = p.y;
    p.x += Math.cos(p.angle) * effSpeed * DT;
    p.y += Math.sin(p.angle) * effSpeed * DT;

    // Spawn grace (3 seconds = 180 frames)
    if (p.spawning) {
      if (p.stepCount > 180) {
        p.spawning = false;
        p.drawing = true;
        p.gapTimer = 0;
        p._prevDrawX = p.x; p._prevDrawY = p.y;
      }
      continue; // no collision/trail/gap during spawning
    }

    // Gap mechanics (distance-based)
    p.gapTimer += DT;
    if (p.gapRemaining > 0) {
      p.gapRemaining -= effSpeed * DT;
      if (p.gapRemaining <= 0) {
        p.drawing = true;
        p.gapTimer = 0;
        p._prevDrawX = p.x; p._prevDrawY = p.y;
        p.nextGapAt = GAP_INT_MIN + Math.random() * (GAP_INT_MAX - GAP_INT_MIN);
      }
    } else if (p.gapTimer >= p.nextGapAt) {
      p.drawing = false;
      const jitter = (Math.random() - 0.5) * 0.032;
      p.gapRemaining = GAP_LEN * (1.0 + jitter);
    }

    // Collision (swept)
    if (sweptCollision(p)) { p.alive = false; continue; }

    // Powerup pickup
    for (let pi = G.powerups.length - 1; pi >= 0; pi--) {
      const pup = G.powerups[pi];
      const d2 = (p.x-pup.x)**2 + (p.y-pup.y)**2;
      if (d2 < PUP_PICKUP_R * PUP_PICKUP_R) {
        if (pup.type === 'speed') p.speedBoosts.push({ expire: G.step + PUP_SPEED_DUR, mult: PUP_SPEED_MULT });
        else { G.trailOwner.fill(0); G.trailFrame.fill(0); }
        G.powerups.splice(pi, 1);
      }
    }

    // Draw trail
    if (p.drawing) drawTrail(p);
  }

  // Spawn powerups
  G.pupSpawnTimer--;
  if (G.pupSpawnTimer <= 0) {
    const margin = PUP_RADIUS * 2;
    const px = margin + Math.random() * (A - 2*margin);
    const py = OFF_Y + margin + Math.random() * (ARENA_H - 2*margin);
    G.powerups.push({ x: px, y: py, type: Math.random() < 2/3 ? 'speed' : 'erase', id: G.pupIdCounter++ });
    G.pupSpawnTimer = PUP_SPAWN_INT;
  }

  G.step++;
  let aliveCount = 0;
  for (const p of G.players) if (p.alive) aliveCount++;
  if (aliveCount <= 1 || G.step >= MAX_STEPS) endRound('end');
}

// ======================== RENDERING ========================
function render() {
  // Build 512x512 RGB from trailOwner
  if (!G._renderImg) G._renderImg = offCtx.createImageData(A, A);
  const imgData = G._renderImg;
  const d = imgData.data;
  // Background — fast fill via Uint32Array view
  const d32 = new Uint32Array(d.buffer);
  d32.fill(0xFF180D0D); // ABGR for rgba(13,13,24,255)
  // Walls (GS++ top/bottom bands)
  const ww = Math.max(1, Math.ceil(WM));
  for (let y = 0; y < OFF_Y + ww; y++) for (let x = 0; x < A; x++) { const i=(y*A+x)*4; d[i]=42;d[i+1]=42;d[i+2]=62; }
  for (let y = OFF_Y+ARENA_H-ww; y < A; y++) for (let x = 0; x < A; x++) { const i=(y*A+x)*4; d[i]=42;d[i+1]=42;d[i+2]=62; }
  for (let y = OFF_Y; y < OFF_Y+ARENA_H; y++) { for (let x=0;x<ww;x++){const i=(y*A+x)*4;d[i]=42;d[i+1]=42;d[i+2]=62;} for(let x=A-ww;x<A;x++){const i=(y*A+x)*4;d[i]=42;d[i+1]=42;d[i+2]=62;} }
  // Trails
  for (let i = 0; i < A*A; i++) {
    const owner = G.trailOwner[i];
    if (owner > 0) {
      const ci = Math.min(owner - 1, COLORS.length - 1);
      const rgb = COLORS[ci].rgb;
      d[i*4] = rgb[0]; d[i*4+1] = rgb[1]; d[i*4+2] = rgb[2];
    }
  }
  // Powerups
  for (const pup of G.powerups) {
    const ix = Math.round(pup.x), iy = Math.round(pup.y);
    const col = pup.type === 'speed' ? [76,175,80] : [50,100,255];
    for (let dy=-PUP_RADIUS; dy<=PUP_RADIUS; dy++) for (let dx=-PUP_RADIUS; dx<=PUP_RADIUS; dx++) {
      if (dx*dx+dy*dy<=PUP_RADIUS*PUP_RADIUS) { const cx=ix+dx,cy=iy+dy;
        if(cx>=0&&cx<A&&cy>=0&&cy<A){const i=(cy*A+cx)*4;d[i]=col[0];d[i+1]=col[1];d[i+2]=col[2];}}
    }
  }
  // Heads
  for (const p of G.players) {
    if (!p.alive) continue;
    const ix=Math.round(p.x), iy=Math.round(p.y), hr=HEAD_R+1;
    for (let dy=-hr;dy<=hr;dy++) for(let dx=-hr;dx<=hr;dx++) {
      if(dx*dx+dy*dy<=hr*hr){const cx=ix+dx,cy=iy+dy;
        if(cx>=0&&cx<A&&cy>=0&&cy<A){const i=(cy*A+cx)*4;d[i]=255;d[i+1]=255;d[i+2]=255;}}
    }
  }
  offCtx.putImageData(imgData, 0, 0);
  // Scale to display canvas
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offC, 0, 0, gc.width, gc.height);

  // Status
  if (G.running && G.step % 5 === 0) {
    const alive = G.players.reduce((n,p)=>n+p.alive, 0);
    statusBar.textContent = `Step: ${G.step} | Alive: ${alive}/${G.players.length} | Infer: ${G.inferMs.toFixed(0)}ms`;
  } else if (!G.running) statusBar.textContent = '';

  // AI viz
  if (G.running && G._vizSelf) {
    if (!G._vizImgData) G._vizImgData = vizCtx.createImageData(OBS, OBS);
    const id = G._vizImgData, s = G._vizSelf, e = G._vizEnemy;
    for (let i=0;i<OBS*OBS;i++){id.data[i*4]=e[i]*255;id.data[i*4+1]=s[i]*200;id.data[i*4+2]=0;id.data[i*4+3]=255;}
    vizCtx.putImageData(id,0,0);
  }
  // Perf
  if (G.step % 15 === 0 && G.model) {
    document.getElementById('perf-info').innerHTML = `<span class="label">Infer:</span> <span class="${G.inferAvg>80?'val-bad':G.inferAvg>40?'val-warn':'val'}">${G.inferMs.toFixed(0)}ms</span> avg <span class="val">${G.inferAvg.toFixed(0)}ms</span>`;
  }
}

// ======================== MAIN LOOP ========================
let lastTime = 0, accumulator = 0;
const STEP_MS = 1000 / FPS;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = ts; return; }
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;
  if (G.running) {
    accumulator += dt * G.gameSpeed;
    let steps = 0;
    while (accumulator >= STEP_MS && G.running && steps < 10) { physicsStep(); accumulator -= STEP_MS; steps++; }
    if (steps >= 10) accumulator = 0;
  }
  render();
}

// ======================== AUTO-LOAD + INIT ========================
async function autoLoadWeights() {
  await loadModelFromURL('curvecrash_v8_weights.json');
}

async function init() {
  await tf.ready();
  try { await tf.setBackend('webgl'); } catch(e) {}

  // Scale canvas to fit
  function resizeCanvas() {
    const wrap = document.getElementById('game-wrap');
    const maxW = wrap.clientWidth - 40, maxH = wrap.clientHeight - 40;
    const scale = Math.min(maxW / A, maxH / A, 2.0);
    gc.style.width = Math.floor(A * scale) + 'px';
    gc.style.height = Math.floor(A * scale) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  await autoLoadWeights();
  requestAnimationFrame(gameLoop);
}

init();
</script>
