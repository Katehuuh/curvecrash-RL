<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurveCrash AI — Play vs Bot</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0/dist/tf.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; height:100vh; }
#app { display:flex; height:100vh; }
#sidebar { width:280px; background:#12121e; border-right:2px solid #1a1a2e; padding:16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
#sidebar h1 { font-size:18px; color:#0ff; margin:0; }
#sidebar h1 span { color:#888; font-size:12px; font-weight:normal; }
.btn { padding:10px 16px; border:none; border-radius:6px; font-weight:bold; font-size:14px; cursor:pointer; transition:all .15s; }
.btn:hover { filter:brightness(1.2); }
.btn-load { background:#1a6b1a; color:#fff; }
.btn-start { background:#0066aa; color:#fff; font-size:16px; }
.btn-start.running { background:#aa2222; }
.info-box { background:#1a1a2e; border-radius:6px; padding:10px; font-size:12px; line-height:1.6; font-family:monospace; }
.info-box .label { color:#888; }
.info-box .val { color:#0f0; }
.info-box .val-warn { color:#f80; }
.info-box .val-bad { color:#f44; }
#game-wrap { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
canvas#game { background:#0d0d18; border:2px solid #1a1a2e; border-radius:4px; image-rendering:pixelated; }
#overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
#overlay h2 { font-size:28px; color:#0ff; text-shadow:0 0 20px #0ff8; margin-bottom:8px; }
#overlay p { font-size:16px; color:#aaa; }
#scoreboard { position:absolute; top:12px; left:50%; transform:translateX(-50%); display:flex; gap:24px; font-size:18px; font-weight:bold; }
.score-item { padding:6px 16px; border-radius:4px; }
.score-human { background:#1a3a1a; color:#4f4; border:1px solid #4f4; }
.score-ai { background:#3a1a1a; color:#f44; border:1px solid #f44; }
.score-draw { background:#2a2a1a; color:#ff0; border:1px solid #ff0; }
#status-bar { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); font-size:13px; color:#888; background:#12121ecc; padding:4px 12px; border-radius:4px; }
#controls-hint { font-size:11px; color:#666; text-align:center; line-height:1.5; }
.speed-sel { display:flex; gap:4px; }
.speed-sel button { flex:1; padding:4px; font-size:11px; background:#1a1a2e; color:#888; border:1px solid #333; border-radius:3px; cursor:pointer; }
.speed-sel button.active { background:#0066aa; color:#fff; border-color:#08f; }
#ai-viz-wrap { text-align:center; }
#ai-viz-wrap canvas { border:1px solid #333; image-rendering:pixelated; }
#ai-viz-label { font-size:10px; color:#555; margin-top:2px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>CurveCrash AI <span>v8 IMPALA</span></h1>
    <div class="info-box" id="model-info">
      <span class="label">Model:</span> <span class="val-warn">loading v8 weights...</span>
    </div>
    <button id="btn-load" style="background:none;border:1px solid #333;color:#666;font-size:11px;padding:3px 8px;border-radius:3px;cursor:pointer;width:100%">load custom weights (.json)</button>
    <button class="btn btn-start" id="btn-start">START GAME</button>
    <div class="info-box" id="score-info">
      <div><span class="label">Human:</span> <span class="val" id="s-human">0</span></div>
      <div><span class="label">AI:</span> <span class="val" id="s-ai">0</span></div>
      <div><span class="label">Draws:</span> <span class="val" id="s-draw">0</span></div>
      <div><span class="label">Round:</span> <span class="val" id="s-round">0</span></div>
    </div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">Game Speed</div>
      <div class="speed-sel" id="speed-sel">
        <button data-speed="0.5">0.5x</button>
        <button data-speed="1" class="active">1x</button>
        <button data-speed="2">2x</button>
        <button data-speed="3">3x</button>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">Players</div>
      <div class="speed-sel" id="player-sel">
        <button data-p="2" class="active">1v1</button>
        <button data-p="3">3</button>
        <button data-p="4">4</button>
        <button data-p="6">6</button>
      </div>
    </div>
    <div class="info-box" id="perf-info">
      <span class="label">Infer:</span> <span class="val">—</span>
    </div>
    <div id="ai-viz-wrap">
      <canvas id="ai-viz" width="128" height="128" style="width:128px;height:128px;"></canvas>
      <div id="ai-viz-label">AI observation (ego-centric)</div>
    </div>
    <div id="controls-hint">
      <b>Controls:</b> Arrow Left/Right to steer<br>
      Space or Enter to start round<br>
      Human = <span style="color:#4f4">green</span>, AI = <span style="color:#f44">red</span>
    </div>
  </div>
  <div id="game-wrap">
    <canvas id="game" width="922" height="763"></canvas>
    <div id="overlay">
      <h2>CurveCrash AI</h2>
      <p>Load weights, then press START or Space</p>
    </div>
    <div id="status-bar"></div>
  </div>
</div>

<script>
'use strict';

// ======================== PHYSICS (match curvecrash_env_ffa.py GS++ mode) ========================
const FW = 922, FH = 763, FPS = 60;
const SPEED = 180 / FPS;            // 3 px/frame in field coords
const TURN_RADIUS = 38.5;
const TURN_RATE = (180/FPS) / TURN_RADIUS; // rad/frame
const TRAIL_W = 6.3;                // trail diameter in field coords
const TRAIL_HW = TRAIL_W / 2;
const GAP_LEN = 22.4;               // gap length in field px
const GAP_INT_MIN = 1.1, GAP_INT_MAX = 2.0; // seconds between gaps
const GAP_DUR = 0.159;              // gap duration seconds (GS++ uses fixed distance, approximate with time)
const MAX_STEPS = 3600;             // 60s at 60fps
const WALL_T = 4;                   // wall thickness in field px

// GS++ powerups
const PUP_SPAWN_INT = 76;           // frames between spawns (match env powerup_spawn_interval=76)
const PUP_VIS_RADIUS = 16 / SIM_SCALE; // visual radius in field px (~29px)
const PUP_PICKUP_RADIUS = PUP_VIS_RADIUS + TRAIL_HW; // pickup = visual + trail half-width
const PUP_SPEED_MULT = 2.0;         // speed multiplier per boost (multiplicative stacking)
const PUP_SPEED_DUR = 4 * FPS;      // speed boost duration (frames)
const PUP_FIRST_SPAWN = Math.round(3.5 * FPS); // first powerup at ~3.5s

// Observation constants (match env)
const OBS = 128;
const SIM = 512;
const SIM_SCALE = SIM / FW;
const DS = SIM / OBS;
const OBS_SCALE = SIM_SCALE / DS;
const ARENA_H = Math.round(FH * SIM_SCALE);
const OFF_Y = Math.floor((SIM - ARENA_H) / 2);
const OBS_OFF_Y = OFF_Y / DS;

// ======================== GAME STATE ========================
const G = {
  running: false,
  players: [],     // [{x, y, angle, alive, trail:[], isHuman, color, gapTimer, inGap, gapDist, speed}]
  step: 0,
  maxPlayers: 2,
  gameSpeed: 1,
  scores: { human: 0, ai: 0, draw: 0, round: 0 },
  // AI state
  model: null,
  gruTensor: null,
  prevSelf: null,
  prevEnemy: null,
  inferMs: 0,
  inferAvg: 0,
  // Trail grid for collision (field resolution)
  trailGrid: null, // Uint8Array(FW * FH) — 0=empty, pid=occupied
  // Powerups
  powerups: [],    // [{x, y, type:'speed'|'erase', id}]
  pupIdCounter: 0,
  pupSpawnTimer: 0,
};

// ======================== CANVAS ========================
const gc = document.getElementById('game');
const ctx = gc.getContext('2d');
const vizC = document.getElementById('ai-viz');
const vizCtx = vizC.getContext('2d');
const overlay = document.getElementById('overlay');
const statusBar = document.getElementById('status-bar');

// ======================== INPUT ========================
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'Enter') && !G.running) startRound();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ======================== UI WIRING ========================
document.getElementById('btn-load').onclick = loadWeights;
document.getElementById('btn-start').onclick = () => { if (!G.running) { clearTimeout(G._restartTimer); startRound(); } else endRound('abort'); };

document.getElementById('speed-sel').onclick = e => {
  if (!e.target.dataset.speed) return;
  G.gameSpeed = parseFloat(e.target.dataset.speed);
  document.querySelectorAll('#speed-sel button').forEach(b => b.classList.toggle('active', b === e.target));
};
document.getElementById('player-sel').onclick = e => {
  if (!e.target.dataset.p) return;
  G.maxPlayers = parseInt(e.target.dataset.p);
  document.querySelectorAll('#player-sel button').forEach(b => b.classList.toggle('active', b === e.target));
};

// ======================== WEIGHT LOADING ========================
function loadWeights() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const info = document.getElementById('model-info');
    info.innerHTML = '<span class="label">Loading...</span>';
    try {
      const json = JSON.parse(await file.text());
      G.model = buildTFModel(json);
      const arch = G.model.arch || json.version;
      info.innerHTML = `<span class="label">Model:</span> <span class="val">${arch} ${G.model.nCh}ch ${json.gru_hidden ? 'GRU('+json.gru_hidden+')' : ''}</span><br><span class="label">CBAM:</span> <span class="val">${G.model.hasCBAM?'ON':'off'}</span> | <span class="label">Params:</span> <span class="val">2.3M</span>`;
      overlay.querySelector('p').textContent = 'Press START or Space to play!';
    } catch(err) {
      info.innerHTML = `<span class="val-bad">Error: ${err.message}</span>`;
    }
  };
  input.click();
}

// ======================== BASE64 WEIGHT DECODING ========================
function b64toF32(b64str, shape) {
  const bin = atob(b64str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const floats = new Float32Array(bytes.buffer);
  if (shape.length === 1) return tf.tensor1d(floats);
  if (shape.length === 2) return tf.tensor2d(floats, shape);
  if (shape.length === 4) return tf.tensor4d(floats, shape);
  return tf.tensor(floats, shape);
}
function decW(layer, key) {
  // Support both base64 compact and raw array formats
  if (typeof layer[key] === 'string' && layer[key + '_shape']) return b64toF32(layer[key], layer[key + '_shape']);
  if (layer[key + '_shape']) return tf.tensor(layer[key], layer[key + '_shape']);
  if (Array.isArray(layer[key])) {
    const a = layer[key];
    if (a.length > 0 && Array.isArray(a[0])) {
      if (Array.isArray(a[0][0])) { if (Array.isArray(a[0][0][0])) return tf.tensor4d(a); return tf.tensor3d(a); }
      return tf.tensor2d(a);
    }
    return tf.tensor1d(a);
  }
  return null;
}
function decGRUGate(g) {
  return {
    Wi: typeof g.kernel_input === 'string' ? b64toF32(g.kernel_input, g.kernel_input_shape) : tf.tensor2d(g.kernel_input),
    Wh: typeof g.kernel_hidden === 'string' ? b64toF32(g.kernel_hidden, g.kernel_hidden_shape) : tf.tensor2d(g.kernel_hidden),
    bi: typeof g.bias_input === 'string' ? b64toF32(g.bias_input, g.bias_input_shape) : tf.tensor1d(g.bias_input),
    bh: typeof g.bias_hidden === 'string' ? b64toF32(g.bias_hidden, g.bias_hidden_shape) : tf.tensor1d(g.bias_hidden),
  };
}

// ======================== TF.JS MODEL ========================
function buildTFModel(json) {
  const m = { arch: json.arch || 'naturecnn', nCh: json.n_input_channels || 6 };
  const layers = json.layers;
  let idx = 0;

  if (m.arch === 'impala') {
    const ns = json.impala_channels ? json.impala_channels.length : 3;
    m.stages = [];
    for (let i = 0; i < ns; i++) {
      const l = layers[idx++];
      m.stages.push({
        cW: decW(l,'conv_weight'), cB: decW(l,'conv_bias'),
        r1c1W: decW(l,'res1_conv1_weight'), r1c1B: decW(l,'res1_conv1_bias'),
        r1c2W: decW(l,'res1_conv2_weight'), r1c2B: decW(l,'res1_conv2_bias'),
        r2c1W: decW(l,'res2_conv1_weight'), r2c1B: decW(l,'res2_conv1_bias'),
        r2c2W: decW(l,'res2_conv2_weight'), r2c2B: decW(l,'res2_conv2_bias'),
      });
    }
  } else {
    m.conv = [];
    for (let i = 0; i < 3; i++) { const l = layers[idx++]; m.conv.push({ w: decW(l,'weight'), b: decW(l,'bias'), s: l.stride }); }
  }
  m.hasCBAM = json.has_cbam;
  if (m.hasCBAM) { const l = layers[idx++]; m.cbam = { f0: decW(l,'channel_fc0_weight'), f2: decW(l,'channel_fc2_weight'), sp: decW(l,'spatial_conv_weight') }; }
  m.hasSA = json.has_spatial_attn;
  if (m.hasSA) { const l = layers[idx++]; m.sa = { qkv: decW(l,'qkv_weight'), pW: decW(l,'proj_weight'), pB: decW(l,'proj_bias'), nh: l.num_heads, d: l.dim }; }
  const fcL = layers[idx++]; m.fc = { w: decW(fcL,'weight'), b: decW(fcL,'bias') };
  m.hasGRU = json.gru_hidden > 0;
  if (m.hasGRU) {
    const gl = layers[idx++]; m.gruH = gl.units; m.gru = {};
    for (const g of ['reset','update','new']) m.gru[g] = decGRUGate(gl.gates[g]);
  }
  const aL = layers[idx++]; m.actor = { w: decW(aL,'weight'), b: decW(aL,'bias') };
  return m;
}

function aiInfer(obsNhwc) {
  if (!G.model) return 1;
  const t0 = performance.now();
  const m = G.model;
  let newGru = null;
  const act = tf.tidy(() => {
    let x = tf.tensor4d(obsNhwc, [1, OBS, OBS, m.nCh]);
    if (m.arch === 'impala') {
      for (const s of m.stages) {
        x = tf.conv2d(x, s.cW, 1, 'same').add(s.cB);
        x = tf.maxPool(x, 3, 2, 'same');
        let r = x; x = tf.relu(x); x = tf.conv2d(x, s.r1c1W, 1, 'same').add(s.r1c1B); x = tf.relu(x); x = tf.conv2d(x, s.r1c2W, 1, 'same').add(s.r1c2B); x = x.add(r);
        r = x; x = tf.relu(x); x = tf.conv2d(x, s.r2c1W, 1, 'same').add(s.r2c1B); x = tf.relu(x); x = tf.conv2d(x, s.r2c2W, 1, 'same').add(s.r2c2B); x = x.add(r);
      }
      x = tf.relu(x);
    } else {
      for (const c of m.conv) x = tf.relu(tf.conv2d(x, c.w, c.s, 'valid').add(c.b));
    }
    if (m.hasCBAM) {
      const af = x.mean([1,2],true).reshape([1,-1]), mf = x.max([1,2],true).reshape([1,-1]);
      x = x.mul(tf.sigmoid(tf.relu(tf.matMul(af,m.cbam.f0)).matMul(m.cbam.f2).add(tf.relu(tf.matMul(mf,m.cbam.f0)).matMul(m.cbam.f2))).reshape([1,1,1,-1]));
      x = x.mul(tf.sigmoid(tf.conv2d(tf.concat([x.mean(3,true),x.max(3,true)],3),m.cbam.sp,1,'same')));
    }
    if (m.hasSA) {
      const sa=m.sa, [B,H,W,C]=x.shape, nt=H*W, hd=sa.d/sa.nh, sc=1/Math.sqrt(hd);
      const tok=x.reshape([1,nt,C]), qkv=tf.matMul(tok,sa.qkv).reshape([1,nt,3,sa.nh,hd]).transpose([2,0,3,1,4]);
      const q=qkv.gather(0).reshape([1,sa.nh,nt,hd]), k=qkv.gather(1).reshape([1,sa.nh,nt,hd]), v=qkv.gather(2).reshape([1,sa.nh,nt,hd]);
      const att=tf.softmax(tf.matMul(q,k.transpose([0,1,3,2])).mul(sc),-1);
      x = tok.add(tf.matMul(tf.matMul(att,v).transpose([0,2,1,3]).reshape([1,nt,C]),sa.pW).add(sa.pB)).reshape([1,H,W,C]);
    }
    x = tf.relu(tf.matMul(x.reshape([1,-1]),m.fc.w).add(m.fc.b));
    if (m.hasGRU) {
      const h = G.gruTensor || tf.zeros([1,m.gruH]);
      const rg=m.gru.reset, zg=m.gru.update, ng=m.gru.new;
      const r=tf.sigmoid(tf.matMul(x,rg.Wi).add(rg.bi).add(tf.matMul(h,rg.Wh).add(rg.bh)));
      const z=tf.sigmoid(tf.matMul(x,zg.Wi).add(zg.bi).add(tf.matMul(h,zg.Wh).add(zg.bh)));
      const n=tf.tanh(tf.matMul(x,ng.Wi).add(ng.bi).add(r.mul(tf.matMul(h,ng.Wh).add(ng.bh))));
      const hNew=tf.sub(tf.scalar(1),z).mul(n).add(z.mul(h));
      newGru = tf.keep(hNew); x = hNew;
    }
    const l = tf.matMul(x,m.actor.w).add(m.actor.b).dataSync();
    return l[0]>=l[1]&&l[0]>=l[2] ? 0 : l[2]>=l[1] ? 2 : 1;
  });
  if (newGru) { if (G.gruTensor) G.gruTensor.dispose(); G.gruTensor = newGru; }
  const ms = performance.now() - t0;
  G.inferMs = ms;
  G.inferAvg = G.inferAvg > 0 ? G.inferAvg * 0.9 + ms * 0.1 : ms;
  return act;
}

// ======================== OBSERVATION BUILDING ========================
function rotCh(ch, hx, hy, hdg, fill) {
  const N = OBS, half = N/2, cos = Math.cos(hdg), sin = Math.sin(hdg);
  const out = new Float32Array(N*N);
  for (let r=0; r<N; r++) { const dy=r-half+.5;
    for (let c=0; c<N; c++) { const dx=c-half+.5;
      const sc=Math.round(hx+cos*dx-sin*dy), sr=Math.round(hy+sin*dx+cos*dy);
      out[r*N+c] = (sc>=0&&sc<N&&sr>=0&&sr<N) ? ch[sr*N+sc] : fill;
    }
  }
  return out;
}

function buildTrailGrids(pid) {
  // Build 128x128 self/enemy trail grids from player trail data
  const N = OBS, NN = N*N;
  const selfCh = new Float32Array(NN), enemyCh = new Float32Array(NN);

  // Draw trails
  for (const p of G.players) {
    if (!p.alive && p.trail.length === 0) continue;
    const ch = (p.id === pid) ? selfCh : enemyCh;
    for (const seg of p.trail) {
      const ox = Math.round(seg.x * OBS_SCALE);
      const oy = Math.round(seg.y * OBS_SCALE + OBS_OFF_Y);
      if (ox >= 0 && ox < N && oy >= 0 && oy < N) ch[oy*N+ox] = 1.0;
      // Stamp small radius
      for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
        const cx=ox+dx, cy=oy+dy;
        if (cx>=0&&cx<N&&cy>=0&&cy<N) ch[cy*N+cx]=1.0;
      }
    }
  }

  // Walls (GS++ mode: top/bottom bands + border)
  const top_ds = Math.floor(OFF_Y / DS);
  const bot_ds = Math.min(N, Math.floor((OFF_Y + ARENA_H + DS - 1) / DS));
  for (let r=0; r<top_ds; r++) for (let c=0; c<N; c++) selfCh[r*N+c]=1;
  for (let r=bot_ds; r<N; r++) for (let c=0; c<N; c++) selfCh[r*N+c]=1;
  if (top_ds>=0&&top_ds<N) for (let c=0;c<N;c++) selfCh[top_ds*N+c]=1;
  if (bot_ds>0&&bot_ds<=N) for (let c=0;c<N;c++) selfCh[(bot_ds-1)*N+c]=1;
  for (let r=top_ds; r<bot_ds; r++) { selfCh[r*N]=1; selfCh[r*N+N-1]=1; }

  // Direction arrows
  for (const p of G.players) {
    if (!p.alive) continue;
    const ch = (p.id === pid) ? selfCh : enemyCh;
    const px = p.x * OBS_SCALE, py = p.y * OBS_SCALE + OBS_OFF_Y;
    for (let t=0; t<5; t++) {
      const ax=Math.round(px+Math.cos(p.angle)*t), ay=Math.round(py+Math.sin(p.angle)*t);
      if (ax>=0&&ax<N&&ay>=0&&ay<N) ch[ay*N+ax]=1;
    }
  }
  return { self: selfCh, enemy: enemyCh };
}

function computeVoronoi(selfCh, enemyCh, pid) {
  const N=OBS, NN=N*N;
  const blocked = new Uint8Array(NN);
  for (let i=0;i<NN;i++) if (selfCh[i]>.5||enemyCh[i]>.5) blocked[i]=1;
  const territory = new Uint8Array(NN);
  const me = G.players.find(p=>p.id===pid);
  if (!me) return new Float32Array(NN);
  const ehx=Math.round(me.x*OBS_SCALE), ehy=Math.round(me.y*OBS_SCALE+OBS_OFF_Y);
  const ei=ehy*N+ehx;
  let egoQ=[], enemyQ=[];
  if (ei>=0&&ei<NN&&!blocked[ei]) { territory[ei]=1; blocked[ei]=1; egoQ.push(ei); }
  for (const p of G.players) {
    if (!p.alive||p.id===pid) continue;
    const ex=Math.round(p.x*OBS_SCALE), ey=Math.round(p.y*OBS_SCALE+OBS_OFF_Y), idx=ey*N+ex;
    if (idx>=0&&idx<NN&&!blocked[idx]) { territory[idx]=2; blocked[idx]=1; enemyQ.push(idx); }
  }
  while (egoQ.length||enemyQ.length) {
    let nE=[];
    for (const i of egoQ) { const c=i%N,r=(i-c)/N;
      if(c>0&&!blocked[i-1]){blocked[i-1]=1;territory[i-1]=1;nE.push(i-1);}
      if(c<N-1&&!blocked[i+1]){blocked[i+1]=1;territory[i+1]=1;nE.push(i+1);}
      if(r>0&&!blocked[i-N]){blocked[i-N]=1;territory[i-N]=1;nE.push(i-N);}
      if(r<N-1&&!blocked[i+N]){blocked[i+N]=1;territory[i+N]=1;nE.push(i+N);}
    }
    let nX=[];
    for (const i of enemyQ) { const c=i%N,r=(i-c)/N;
      if(c>0&&!blocked[i-1]){blocked[i-1]=1;territory[i-1]=2;nX.push(i-1);}
      if(c<N-1&&!blocked[i+1]){blocked[i+1]=1;territory[i+1]=2;nX.push(i+1);}
      if(r>0&&!blocked[i-N]){blocked[i-N]=1;territory[i-N]=2;nX.push(i-N);}
      if(r<N-1&&!blocked[i+N]){blocked[i+N]=1;territory[i+N]=2;nX.push(i+N);}
    }
    egoQ=nE; enemyQ=nX;
  }
  const v=new Float32Array(NN);
  for (let i=0;i<NN;i++) if(territory[i]===1) v[i]=1;
  return v;
}

function buildAIObs(pid) {
  const {self: selfCh, enemy: enemyCh} = buildTrailGrids(pid);
  const me = G.players.find(p=>p.id===pid);
  if (!me) return null;
  const hx=me.x*OBS_SCALE, hy=me.y*OBS_SCALE+OBS_OFF_Y, hdg=me.angle;
  const rS=rotCh(selfCh,hx,hy,hdg,1), rE=rotCh(enemyCh,hx,hy,hdg,0);
  let rPS, rPE;
  if (G.prevSelf) { rPS=rotCh(G.prevSelf,hx,hy,hdg,1); rPE=rotCh(G.prevEnemy,hx,hy,hdg,0); }
  else { const z=new Float32Array(OBS*OBS); rPS=rotCh(z,hx,hy,hdg,1); rPE=rotCh(z,hx,hy,hdg,0); }
  // Powerup channels
  const N = OBS, NN = N*N;
  const spdCh = new Float32Array(NN), ersCh = new Float32Array(NN);
  const pupR = Math.max(1, Math.round(N * 0.03));
  for (const pup of G.powerups) {
    const px = Math.round(pup.x * OBS_SCALE), py = Math.round(pup.y * OBS_SCALE + OBS_OFF_Y);
    const ch = pup.type === 'speed' ? spdCh : ersCh;
    for (let dy=-pupR; dy<=pupR; dy++) for (let dx=-pupR; dx<=pupR; dx++) {
      if (dx*dx+dy*dy<=pupR*pupR) { const cx=px+dx, cy=py+dy; if(cx>=0&&cx<N&&cy>=0&&cy<N) ch[cy*N+cx]=1; }
    }
  }
  const rSpd = rotCh(spdCh, hx, hy, hdg, 0), rErs = rotCh(ersCh, hx, hy, hdg, 0);
  // Voronoi
  const nCh = G.model ? G.model.nCh : 7;
  const obs = new Float32Array(NN * nCh);
  let rV = null;
  if (nCh >= 7) rV = rotCh(computeVoronoi(selfCh, enemyCh, pid), hx, hy, hdg, 0);
  for (let i=0; i<NN; i++) {
    obs[i*nCh+0]=rS[i]; obs[i*nCh+1]=rE[i]; obs[i*nCh+2]=rPS[i]; obs[i*nCh+3]=rPE[i];
    obs[i*nCh+4]=rSpd[i]; obs[i*nCh+5]=rErs[i];
    if (nCh>=7) obs[i*nCh+6]=rV[i];
  }
  G.prevSelf = selfCh; G.prevEnemy = enemyCh;
  return obs;
}

// ======================== GAME LOGIC ========================
const COLORS = [
  {r:80,g:255,b:80, hex:'#50ff50', name:'Human'},     // green for human (always index 0)
  {r:255,g:80,b:80, hex:'#ff5050', name:'AI 1'},       // red
  {r:80,g:180,b:255, hex:'#50b4ff', name:'AI 2'},      // blue
  {r:255,g:200,b:50, hex:'#ffc832', name:'AI 3'},      // yellow
  {r:200,g:80,b:255, hex:'#c850ff', name:'AI 4'},      // purple
  {r:255,g:140,b:50, hex:'#ff8c32', name:'AI 5'},      // orange
];

function spawnPlayer(id, isHuman) {
  const margin = WALL_T + 40;
  const x = margin + Math.random() * (FW - 2*margin);
  const y = margin + Math.random() * (FH - 2*margin);
  const angle = Math.random() * Math.PI * 2;
  return {
    id, x, y, angle, alive: true, isHuman,
    color: COLORS[id],
    trail: [],
    speed: SPEED,
    speedBoosts: [], // [{expire: frameCount, mult: 2.0}, ...] — multiplicative stacking
    // Gap mechanics
    gapTimer: (GAP_INT_MIN + Math.random() * (GAP_INT_MAX - GAP_INT_MIN)) * FPS,
    inGap: false,
    gapDist: 0,
    stepCount: 0,
  };
}

function startRound() {
  G.players = [];
  G.step = 0;
  G.prevSelf = null;
  G.prevEnemy = null;
  if (G.gruTensor) { G.gruTensor.dispose(); G.gruTensor = null; }
  G.trailGrid = new Uint8Array(FW * FH);
  G.powerups = [];
  G.pupIdCounter = 0;
  G.pupSpawnTimer = PUP_FIRST_SPAWN;

  // Spawn human + AI bots
  G.players.push(spawnPlayer(0, true));
  for (let i = 1; i < G.maxPlayers; i++) G.players.push(spawnPlayer(i, false));

  G.running = true;
  G.scores.round++;
  overlay.style.display = 'none';
  document.getElementById('btn-start').textContent = 'STOP';
  document.getElementById('btn-start').classList.add('running');
  updateScoreUI();
}

function endRound(reason) {
  G.running = false;
  const alive = G.players.filter(p => p.alive);
  let msg = '';
  if (reason === 'abort') { msg = 'Round aborted'; }
  else if (alive.length === 0) { G.scores.draw++; msg = 'Draw!'; }
  else if (alive.length === 1) {
    if (alive[0].isHuman) { G.scores.human++; msg = 'You win!'; }
    else { G.scores.ai++; msg = 'AI wins!'; }
  } else if (!G.players[0].alive) { G.scores.ai++; msg = 'AI wins!'; }
  else { G.scores.human++; msg = 'You survived!'; }

  overlay.style.display = '';
  overlay.querySelector('h2').textContent = msg;
  overlay.querySelector('p').textContent = 'Next round in 2s...';
  updateScoreUI();

  // Auto-restart after 2 seconds
  if (reason !== 'abort') {
    clearTimeout(G._restartTimer);
    G._restartTimer = setTimeout(() => startRound(), 2000);
  } else {
    document.getElementById('btn-start').textContent = 'START GAME';
    document.getElementById('btn-start').classList.remove('running');
    overlay.querySelector('p').textContent = 'Press Space to play again';
  }
}

function updateScoreUI() {
  document.getElementById('s-human').textContent = G.scores.human;
  document.getElementById('s-ai').textContent = G.scores.ai;
  document.getElementById('s-draw').textContent = G.scores.draw;
  document.getElementById('s-round').textContent = G.scores.round;
}

function checkCollision(x, y, pid) {
  // Wall collision — field boundary with thickness
  if (x < WALL_T || x >= FW - WALL_T || y < WALL_T || y >= FH - WALL_T) return true;
  // Trail collision
  const hw = Math.ceil(TRAIL_HW * 0.5);
  const p = G.players[pid];
  const safeHead = Math.max(0, p.trail.length - 10); // ignore last 10 trail points (own head)
  for (let dy=-hw; dy<=hw; dy++) for (let dx=-hw; dx<=hw; dx++) {
    const cx = Math.round(x+dx), cy = Math.round(y+dy);
    if (cx<0||cx>=FW||cy<0||cy>=FH) return true;
    const gv = G.trailGrid[cy*FW+cx];
    if (gv > 0 && gv !== pid+1) return true; // enemy trail
    if (gv === pid+1) {
      // Self-collision: only collide with old trail, not recent head stamps
      // Check if any of our old trail points are at this grid cell
      for (let ti = 0; ti < safeHead; ti++) {
        const tp = p.trail[ti];
        if (Math.abs(tp.x - cx) < 2 && Math.abs(tp.y - cy) < 2) return true;
      }
    }
  }
  return false;
}

function stampTrail(x, y, pid) {
  const hw = Math.ceil(TRAIL_HW * 0.5);
  for (let dy=-hw; dy<=hw; dy++) for (let dx=-hw; dx<=hw; dx++) {
    if (dx*dx+dy*dy > hw*hw+1) continue;
    const cx=Math.round(x+dx), cy=Math.round(y+dy);
    if (cx>=0&&cx<FW&&cy>=0&&cy<FH) G.trailGrid[cy*FW+cx] = pid+1;
  }
}

function physicsStep() {
  for (const p of G.players) {
    if (!p.alive) continue;
    p.stepCount++;

    // Steering
    let action = 1; // straight
    if (p.isHuman) {
      if (keys['ArrowLeft'] || keys['KeyA']) action = 0;
      else if (keys['ArrowRight'] || keys['KeyD']) action = 2;
    } else {
      // AI decision every 3 frames (FRAME_SKIP=3)
      if (G.model && p.stepCount % 3 === 0) {
        const obs = buildAIObs(p.id);
        if (obs) action = aiInfer(obs);
        p._lastAction = action;
      } else {
        action = p._lastAction || 1;
      }
    }

    // Speed boost: expire old, compute multiplicative stack (BEFORE steering/move)
    p.speedBoosts = p.speedBoosts.filter(b => b.expire > G.step);
    let speedMult = 1.0;
    for (const b of p.speedBoosts) speedMult *= b.mult;
    p.speed = SPEED * speedMult;

    // Turn rate scales with speed^(1/3) like the real game
    const effTurnRate = TURN_RATE * Math.cbrt(speedMult);
    if (action === 0) p.angle -= effTurnRate;
    else if (action === 2) p.angle += effTurnRate;

    // Move
    const nx = p.x + Math.cos(p.angle) * p.speed;
    const ny = p.y + Math.sin(p.angle) * p.speed;

    // Gap mechanics
    p.gapTimer--;
    if (!p.inGap && p.gapTimer <= 0) {
      p.inGap = true;
      p.gapDist = 0;
    }
    if (p.inGap) {
      p.gapDist += p.speed;
      if (p.gapDist >= GAP_LEN) {
        p.inGap = false;
        p.gapTimer = (GAP_INT_MIN + Math.random() * (GAP_INT_MAX - GAP_INT_MIN)) * FPS;
      }
    }

    // Collision check (skip first 3s = 180 frames for spawn grace, matching env SPAWN_SECONDS=3.0)
    if (p.stepCount > 180 && checkCollision(nx, ny, p.id)) {
      p.alive = false;
      continue;
    }

    p.x = nx; p.y = ny;

    // Powerup pickup
    for (let pi = G.powerups.length - 1; pi >= 0; pi--) {
      const pup = G.powerups[pi];
      const dx = p.x - pup.x, dy = p.y - pup.y;
      if (dx*dx + dy*dy < PUP_PICKUP_RADIUS * PUP_PICKUP_RADIUS) {
        if (pup.type === 'speed') {
          // Stack: add new boost (multiplicative with existing)
          p.speedBoosts.push({ expire: G.step + PUP_SPEED_DUR, mult: PUP_SPEED_MULT });
        } else if (pup.type === 'erase') {
          G.trailGrid.fill(0);
          for (const pl of G.players) pl.trail = [];
        }
        G.powerups.splice(pi, 1);
      }
    }

    // Stamp trail (if not in gap)
    if (!p.inGap) {
      p.trail.push({x: p.x, y: p.y});
      stampTrail(p.x, p.y, p.id);
    }
  }

  // Spawn powerups
  G.pupSpawnTimer--;
  if (G.pupSpawnTimer <= 0) {
    const margin = WALL_T + 30;
    const px = margin + Math.random() * (FW - 2*margin);
    const py = margin + Math.random() * (FH - 2*margin);
    const type = Math.random() < 0.6 ? 'speed' : 'erase';
    G.powerups.push({ x: px, y: py, type, id: G.pupIdCounter++ });
    G.pupSpawnTimer = PUP_SPAWN_INT;
  }

  G.step++;
  const alive = G.players.filter(p => p.alive);
  if (alive.length <= 1 || G.step >= MAX_STEPS) endRound('end');
}

// ======================== RENDERING ========================
function render() {
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, 0, gc.width, gc.height);

  // Walls — visible border matching collision zone
  ctx.fillStyle = '#2a2a3e';
  ctx.fillRect(0, 0, FW, WALL_T);           // top
  ctx.fillRect(0, FH - WALL_T, FW, WALL_T); // bottom
  ctx.fillRect(0, 0, WALL_T, FH);           // left
  ctx.fillRect(FW - WALL_T, 0, WALL_T, FH); // right
  // Inner border line
  ctx.strokeStyle = '#4a4a6e';
  ctx.lineWidth = 1;
  ctx.strokeRect(WALL_T, WALL_T, FW - WALL_T*2, FH - WALL_T*2);

  // Draw powerups using repo assets
  for (const pup of G.powerups) {
    const img = pup.type === 'speed' ? G.imgSpeed : G.imgErase;
    if (img && img.complete) {
      const sz = PUP_VIS_RADIUS * 2;
      ctx.drawImage(img, pup.x - sz/2, pup.y - sz/2, sz, sz);
    } else {
      // Fallback circle
      ctx.beginPath();
      ctx.arc(pup.x, pup.y, PUP_VIS_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = pup.type === 'speed' ? '#0f0' : '#44f';
      ctx.fill();
    }
  }

  // Draw trails
  for (const p of G.players) {
    ctx.fillStyle = p.color.hex;
    for (const t of p.trail) {
      ctx.fillRect(Math.round(t.x - TRAIL_HW*.5), Math.round(t.y - TRAIL_HW*.5), Math.ceil(TRAIL_W*.5), Math.ceil(TRAIL_W*.5));
    }
  }

  // Draw heads
  for (const p of G.players) {
    if (!p.alive) continue;
    // Head glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, TRAIL_HW + 2, 0, Math.PI*2);
    ctx.fillStyle = p.color.hex;
    ctx.fill();
    // White center
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    // Direction indicator
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + Math.cos(p.angle)*12, p.y + Math.sin(p.angle)*12);
    ctx.strokeStyle = '#fff8';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Status bar
  if (G.running) {
    const alive = G.players.filter(p=>p.alive).length;
    statusBar.textContent = `Step: ${G.step} | Alive: ${alive}/${G.players.length} | Infer: ${G.inferMs.toFixed(0)}ms (avg ${G.inferAvg.toFixed(0)}ms)`;
  } else {
    statusBar.textContent = '';
  }

  // AI viz
  if (G.running && G.players[0]) {
    const {self: s, enemy: e} = buildTrailGrids(G.players.find(p=>!p.isHuman)?.id || 1);
    const id = vizCtx.createImageData(OBS,OBS);
    for (let i=0;i<OBS*OBS;i++) { id.data[i*4]=e[i]*255; id.data[i*4+1]=s[i]*200; id.data[i*4+2]=0; id.data[i*4+3]=255; }
    vizCtx.putImageData(id,0,0);
  }

  // Perf info
  const pi = document.getElementById('perf-info');
  if (G.model) {
    pi.innerHTML = `<span class="label">Infer:</span> <span class="${G.inferAvg>80?'val-bad':G.inferAvg>40?'val-warn':'val'}">${G.inferMs.toFixed(0)}ms</span> <span class="label">avg</span> <span class="val">${G.inferAvg.toFixed(0)}ms</span> | <span class="val">${G.inferAvg>0?(1000/G.inferAvg).toFixed(0):'?'} fps</span>`;
  }
}

// ======================== MAIN LOOP ========================
let lastTime = 0;
let accumulator = 0;
const STEP_MS = 1000 / FPS;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = ts; return; }
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  if (G.running) {
    accumulator += dt * G.gameSpeed;
    let steps = 0;
    while (accumulator >= STEP_MS && G.running && steps < 10) {
      physicsStep();
      accumulator -= STEP_MS;
      steps++;
    }
    if (steps >= 10) accumulator = 0; // prevent spiral
  }
  render();
}

// ======================== AUTO-LOAD WEIGHTS ========================
async function autoLoadWeights() {
  const info = document.getElementById('model-info');
  info.innerHTML = '<span class="label">Loading v8 weights...</span>';
  try {
    const resp = await fetch('curvecrash_v8_weights.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    G.model = buildTFModel(json);
    const arch = G.model.arch || json.version;
    info.innerHTML = `<span class="label">Model:</span> <span class="val">${arch} ${G.model.nCh}ch GRU(${json.gru_hidden})</span><br><span class="label">CBAM:</span> <span class="val">${G.model.hasCBAM?'ON':'off'}</span> | <span class="label">Params:</span> <span class="val">2.3M</span>`;
    overlay.querySelector('p').textContent = 'Press START or Space to play!';
    console.log(`Auto-loaded v8 weights (${arch}, ${G.model.nCh}ch)`);
  } catch(e) {
    info.innerHTML = '<span class="val-warn">Auto-load failed — use Load button</span>';
    console.warn('Auto-load failed:', e.message);
  }
}

// ======================== INIT ========================
async function init() {
  await tf.ready();
  try { await tf.setBackend('webgl'); } catch(e) { console.warn('WebGL failed, using CPU'); }
  console.log(`TF.js backend: ${tf.getBackend()}`);

  // Scale canvas to fit
  function resizeCanvas() {
    const wrap = document.getElementById('game-wrap');
    const maxW = wrap.clientWidth - 40;
    const maxH = wrap.clientHeight - 40;
    const scale = Math.min(maxW / FW, maxH / FH, 1.5);
    gc.style.width = Math.floor(FW * scale) + 'px';
    gc.style.height = Math.floor(FH * scale) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Load powerup images from repo
  G.imgSpeed = new Image(); G.imgSpeed.src = 'power-up_speeds.png';
  G.imgErase = new Image(); G.imgErase.src = 'power-up_erase.png';

  await autoLoadWeights();
  requestAnimationFrame(gameLoop);
}

init();
</script>
